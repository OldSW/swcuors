name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: libswcuoplugin.so
          - os: windows-latest
            artifact: swcuoplugin.dll
          - os: macos-latest
            artifact: libswcuoplugin.dylib

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swcuoplugin-${{ runner.os }}
          path: target/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: swcuoplugin
          merge-multiple: true

      - name: Zip artifacts
        run: zip -r swcuoplugin-${{ github.ref_name }}.zip swcuoplugin/

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: swcuoplugin-${{ github.ref_name }}.zip
